services:
  web:
    container_name: ${ODOO_CONTAINER_NAME}
    image: odoodev:${ODOO_VERSION}
    # Comandos de odoo (actualizar, instalar, herramientas, etc)
    # command: odoo -u <module_name> -d <database_name> --dev=xml,qweb,reload
    depends_on:
      - db
    ports:
      - "${ODOO_PORT}:8069"
      - "${DEBUGPY_PORT}:${DEBUGPY_PORT}"
    volumes:
      - ./conf:/etc/odoo
      - odoo-web-data:/var/lib/odoo
      - /home/jonaodoo/dev/odoo/jufusa19/recursos/odoo:/var/lib/odoo/odoo
      - /home/jonaodoo/dev/odoo/jufusa19/docker-odoo-dev/src:/var/lib/odoo/custom_addons
    environment:
      - DEBUGPY=true
      - DEBUGPY_PORT=${DEBUGPY_PORT}
      - DEBUGPY_AUX_PORT=${DEBUGPY_AUX_PORT}
      - VIRTUAL_HOST=${ODOO_VIRTUAL_HOST}
      - DBFILTER=^.*$
      - VIRTUAL_PORT=8069
    networks:
      - nginx-proxy_default
    entrypoint: ${ENTRYPOINT}
  db:
    container_name: ${PG_CONTAINER_NAME}
    image: postgres:${PG_VERSION}
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_USER=${PG_USER}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - ${PG_PORT}:5432
    volumes:
      - pgdb-data:/var/lib/postgresql/data/pgdata
    networks:
      - nginx-proxy_default
volumes:
  odoo-web-data:
  pgdb-data:
networks:
  nginx-proxy_default:
    external: true
